# =============================================================================
# Solas Trace — Development Infrastructure
# =============================================================================
# Rust-native AI Agent Observability Platform
#
# Services: PostgreSQL (metadata), ClickHouse (traces), Redis (queues),
#           MinIO (artifact storage), Grafana (metrics), Prometheus (monitoring)
#
# Usage:  docker compose up -d
#         Then run the backend:  cargo run
#         Then run the frontend: cd ui && npm run dev

services:
  # ── PostgreSQL — User/Project/Workspace metadata ──────────────────────────
  postgres:
    image: docker.io/postgres:${PG_VERSION:-17}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-solas}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-solas-dev-pass}
      POSTGRES_DB: ${PG_DB:-solas_trace}
      TZ: UTC
      PGTZ: UTC
    ports:
      - ${PG_PORT:-5434}:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solas"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── ClickHouse — High-performance trace & span storage ────────────────────
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:${CH_VERSION:-25.2}
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CH_DB:-solas}
      CLICKHOUSE_USER: ${CH_USER:-solas}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-solas-ch-pass}
    ports:
      - ${CH_HTTP_PORT:-8124}:8123
      - ${CH_NATIVE_PORT:-9001}:9000
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 2s

  # ── Redis — Job queues, caching, real-time pub/sub ────────────────────────
  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-solas-redis-pass}
    ports:
      - ${REDIS_PORT:-6380}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "solas-redis-pass", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── MinIO — S3-compatible artifact & payload storage ──────────────────────
  minio:
    image: docker.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-solas-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-solas-minio-secret}
    ports:
      - ${MINIO_API_PORT:-9092}:9000
      - ${MINIO_CONSOLE_PORT:-9093}:9002
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 2s

  # ── MinIO Init — Create default bucket ────────────────────────────────────
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set solas http://minio:9000 $${MINIO_USER:-solas-minio} $${MINIO_PASSWORD:-solas-minio-secret};
      mc mb solas/solas-traces --ignore-existing;
      mc mb solas/solas-artifacts --ignore-existing;
      mc mb solas/solas-snapshots --ignore-existing;
      exit 0;
      "
    restart: "no"

  # ── ClickHouse Migrations — Schema setup ──────────────────────────────────
  migrate-clickhouse:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.ch-migrate
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CH_HOST: clickhouse
      CH_PORT: 9000
      CH_USER: ${CH_USER:-solas}
      CH_PASSWORD: ${CH_PASSWORD:-solas-ch-pass}
      CH_DB: ${CH_DB:-solas}
    restart: "no"

  # ── Prometheus — Metrics collection (Solas-exclusive) ─────────────────────
  prometheus:
    image: docker.io/prom/prometheus:latest
    restart: unless-stopped
    ports:
      - ${PROMETHEUS_PORT:-9094}:9090
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Grafana — Visual metrics dashboard (Solas-exclusive) ──────────────────
  grafana:
    image: docker.io/grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-solas-grafana}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - ${GRAFANA_PORT:-3001}:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - clickhouse

volumes:
  pg_data:
    driver: local
  ch_data:
    driver: local
  ch_logs:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
